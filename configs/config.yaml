data:
  raw_data_dir: data/raw
  kaggle_dataset: msambare/fer2013
  train_split: train
  val_split: test
  image_size: 48
  normalize:
    mean: [0.5]
    std: [0.5]
  augmentation:
    horizontal_flip_p: 0.5
    rotation_degrees: 12
    affine_translate: [0.08, 0.08]
    affine_scale: [0.92, 1.08]
    brightness: 0.15
    contrast: 0.15

dataloader:
  batch_size: 32
  num_workers: 4

model:
  num_classes: 7

loss:
  focal:
    alpha: 1.0
    gamma: 2.0
    reduction: mean
    class_balance_beta: 0.999

training:
  epochs: 50
  optimizer:
    lr: 0.001
  scheduler:
    mode: min
    patience: 3
    factor: 0.5

callbacks:
  monitor: loss
  early_stopping:
    patience: 5
    min_delta: 0.0
    mode: min
  checkpoint:
    filepath: checkpoints/best_model.pt
    mode: min
    verbose: true
