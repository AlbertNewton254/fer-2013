data:
  raw_data_dir: data/raw
  kaggle_dataset: msambare/fer2013
  train_split: train
  test_split: test
  image_size: 48
  normalize:
    mean: [0.5]
    std: [0.5]
  augmentation:
    horizontal_flip_p: 0.5
    rotation_degrees: 12
    affine_translate: [0.08, 0.08]
    affine_scale: [0.92, 1.08]
    brightness: 0.15
    contrast: 0.15
    random_erasing_p: 0.25
    random_erasing_scale: [0.02, 0.2]
    random_erasing_ratio: [0.3, 3.3]
    random_erasing_value: random
  gabor:
    enabled: true
    include_original: true
    kernel_size: 9
    sigma: 4.0
    lambda: 8.0
    gamma: 0.5
    psi: 0.0
    num_orientations: 8

dataloader:
  batch_size: 32
  num_workers: 4

model:
  num_classes: 7

loss:
  focal:
    alpha: 1.0
    gamma: 2.0
    reduction: mean
    class_balance_beta: 0.999

training:
  epochs: 50
  val_ratio: 0.2
  random_state: 42
  optimizer:
    lr: 0.001
  scheduler:
    mode: min
    patience: 3
    factor: 0.5

callbacks:
  monitor: val_f1
  lr_scheduler_monitor: val_loss
  early_stopping:
    patience: 5
    min_delta: 0.0
    mode: max
  checkpoint:
    root_dir: checkpoints
    run_prefix: checkpoint_
    best_filename: best_model.pt
    periodic_every_epochs: 10
    periodic_filename: checkpoint_epoch_{epoch:04d}.pt
    mode: max
    verbose: true
